<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoGlyph — Your Name in Landsat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  .container { max-width: 1100px; width: 100%; }

  h1 {
    font-size: 1.8rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-align: center;
    margin-bottom: 0.25rem;
    color: #fff;
  }

  .subtitle {
    text-align: center;
    color: #888;
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }
  .subtitle a { color: #4fc3f7; text-decoration: none; }

  .input-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .input-row input {
    flex: 1;
    padding: 0.75rem 1rem;
    background: #1a1a24;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 1.1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: #4fc3f7; }
  .input-row input::placeholder { color: #555; }
  .input-row button {
    padding: 0.75rem 1.5rem;
    background: #1a6d3c;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .input-row button:hover { background: #21834a; }

  /* Controls row */
  .controls-row {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .filter-select {
    background: #1a1a24;
    color: #e0e0e0;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-size: 0.9rem;
    cursor: pointer;
    outline: none;
  }
  .filter-select:focus { border-color: #4fc3f7; }

  .controls-row button {
    padding: 0.5rem 1.25rem;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-shuffle {
    background: #2a2a3a;
    color: #e0e0e0;
    border: 1px solid #444;
  }
  .btn-shuffle:hover { background: #3a3a4e; }


  /* Letter display area */
  .name-display {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 1rem;
    min-height: 200px;
    overflow-x: auto;
    padding-bottom: 8px;
  }

  .letter-slot {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }
  .letter-slot:hover { border-color: #4fc3f733; }

  .letter-slot .location-label {
    font-size: 0.78rem;
    color: #ccc;
    text-align: center;
    width: 100%;
    padding: 3px 6px;
    background: #11111c;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 320px;
    cursor: help;
    font-weight: 500;
  }
  .letter-slot:hover .location-label { color: #fff; }

  .letter-slot .img-wrapper {
    position: relative;
    line-height: 0;
  }

  .letter-slot img {
    display: block;
    height: 600px;
    width: auto;
    object-fit: contain;
    background: #111;
    transition: filter 0.3s ease;
  }

  .letter-slot .slot-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    background: #11111c;
    padding: 6px 10px;
  }

  .slot-footer .reload-btn {
    background: #1a1a28;
    border: 1px solid #444;
    border-radius: 6px;
    color: #aaa;
    font-size: 1.3rem;
    cursor: pointer;
    padding: 2px 10px 4px;
    line-height: 1;
    transition: all 0.15s;
    font-weight: bold;
  }
  .slot-footer .reload-btn:hover { color: #4fc3f7; border-color: #4fc3f7; background: #1a2a38; }

  .slot-footer .badge {
    color: #888;
    font-size: 0.8rem;
    font-variant-numeric: tabular-nums;
    margin-left: auto;
  }

  .slot-footer .char-label {
    font-size: 0.85rem;
    color: #bbb;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
  }

  /* Filter classes */
  .filter-natural img { filter: none; }
  .filter-infrared img { filter: saturate(3) hue-rotate(-20deg) contrast(1.2); }
  .filter-thermal img { filter: invert(0.85) sepia(0.6) saturate(1.5) contrast(1.1); }
  .filter-contrast img { filter: contrast(1.6) saturate(1.3) brightness(1.1); }
  .filter-grayscale img { filter: grayscale(1); }
  .filter-falsecolor img { filter: saturate(2.5) hue-rotate(100deg); }

  /* Per-letter filter selector in footer */
  .slot-footer .filter-btn {
    background: #1a1a28;
    border: 1px solid #444;
    border-radius: 5px;
    color: #888;
    font-size: 0.85rem;
    cursor: pointer;
    padding: 1px 7px 2px;
    line-height: 1.3;
    transition: all 0.15s;
  }
  .slot-footer .filter-btn:hover { border-color: #4fc3f7; background: #1a2a38; }
  .slot-footer .filter-btn.overridden { border-color: #ff9800; color: #ff9800; }

  /* Animation */
  @keyframes cycleIn {
    from { opacity: 0.3; }
    to { opacity: 1; }
  }
  .letter-slot img.cycling { animation: cycleIn 0.2s ease-out; }

  .brand-section {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1.5rem;
    text-align: center;
  }
  .brand-section a {
    color: #888;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .brand-section a:hover {
    color: #4fc3f7;
  }
  .brand-section .btn-download {
    background: #2e7d32;
    color: #fff;
    padding: 0.75rem 2rem;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 0.5rem;
  }
  .brand-section .btn-download:hover {
    background: #388e3c;
  }
  .brand-section .btn-download:active {
    background: #1b5e20;
  }

  .btn-share {
    background: #1565c0;
    color: #fff;
    padding: 0.5rem 1.25rem;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-share:hover { background: #1976d2; }

  .empty-state {
    text-align: center;
    color: #555;
    padding: 3rem 0;
    font-size: 0.9rem;
  }

  /* Share toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 0.75rem 1.5rem;
    border-radius: 10px;
    font-size: 0.85rem;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.visible { opacity: 1; }

  /* Mobile responsive */
  @media (max-width: 768px) {
    body { padding: 1rem 0.5rem; }
    .container { max-width: 100%; }
    .letter-slot img { height: 200px; }
    .letter-slot .location-label { font-size: 0.6rem; padding: 2px 4px; }
    .slot-footer .reload-btn { font-size: 1rem; padding: 1px 8px 2px; }
    .slot-footer { gap: 4px; padding: 4px 6px; }
    .slot-footer .badge { font-size: 0.7rem; }
    .slot-footer .char-label { font-size: 0.75rem; }
    .controls-row button { font-size: 0.8rem; padding: 0.4rem 0.8rem; }
    .filter-select { font-size: 0.8rem; padding: 0.4rem 0.6rem; }
    .name-display { padding-bottom: 4px; gap: 4px; justify-content: flex-start; }
    .input-row input { font-size: 1rem; padding: 0.6rem 0.8rem; }
    .input-row button { font-size: 0.9rem; padding: 0.6rem 1rem; }

  }
  @media (max-width: 480px) {
    .letter-slot { width: 54px; flex-shrink: 0; }
    .letter-slot img { height: 130px; width: 54px; object-fit: cover; }
    .name-display { gap: 3px; justify-content: center; }
    h1 { font-size: 1.2rem; margin-bottom: 0.15rem; }
    .subtitle { font-size: 0.75rem; margin-bottom: 1rem; }
    .input-row { gap: 0.4rem; margin-bottom: 1rem; }
    .controls-row { gap: 0.5rem; margin-bottom: 1rem; }

    /* Mobile: bare symbol footer — tighter to fit 54px */
    .slot-footer { gap: 0; padding: 4px; justify-content: center; }
    .slot-footer .char-label { display: none; }
    .slot-footer .badge { display: none; }
    .slot-footer .reload-btn {
      background: none;
      border: none;
      padding: 0;
      border-radius: 0;
      font-size: 0.95rem;
    }
    .slot-footer .reload-btn:hover { background: none; border-color: transparent; }
    .slot-footer .filter-btn {
      background: none;
      border: none;
      padding: 0;
      border-radius: 0;
      font-size: 0.9rem;
    }
    .slot-footer .filter-btn:hover { background: none; border-color: transparent; }
  }
  @media (max-width: 360px) {
    .letter-slot { width: 42px; flex-shrink: 0; }
    .letter-slot img { height: 100px; width: 42px; object-fit: cover; }
    .letter-slot .location-label { font-size: 0.5rem; }
    .slot-footer { gap: 0; padding: 4px; justify-content: center; }
    .slot-footer .reload-btn { font-size: 0.85rem; padding: 0; }
    .slot-footer .filter-btn { font-size: 0.8rem; padding: 0; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🌍 GeoGlyph</h1>
  <p class="subtitle">
    Your name in NASA Landsat satellite imagery —
    <a href="https://science.nasa.gov/specials/your-name-in-landsat/" target="_blank">source</a>
  </p>

  <div class="input-row">
    <input type="text" id="nameInput" placeholder="Enter a name..." maxlength="30" autofocus>
    <button id="goBtn" onclick="renderName()">Go</button>
  </div>

  <div class="controls-row" id="controls" style="display:none;">
    <select class="filter-select" id="filterSelect" onchange="applyFilter()">
      <option value="natural">🌿 Natural</option>
      <option value="infrared" selected>🔥 Infrared</option>
      <option value="thermal">🌡️ Thermal</option>
      <option value="contrast">✨ High Contrast</option>
      <option value="grayscale">⚪ Grayscale</option>
      <option value="falsecolor">🎨 False Color</option>
    </select>
    <button class="btn-shuffle" onclick="shuffleAll()">🎲 Shuffle</button>
    <button class="btn-share" id="shareBtn" onclick="shareCurrentName()">📤 Share</button>
  </div>

  <div id="letterDisplay" class="name-display">
    <div class="empty-state">Enter a name above and hit Go ✨</div>
  </div>

  <div class="brand-section" id="brandSection" style="display:none;">
    <button class="btn-download" onclick="downloadImage()">⬇ Download Your Name</button>
    <a href="https://leadvector.sh" target="_blank" rel="noopener noreferrer" class="brand-heading">
      leadvector.sh — Automated Lead Pipeline →
    </a>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

let currentName = '';
let currentVariants = {};
let currentFilters = {}; // per-letter filter overrides: { 'a': 'infrared', ... }

const FILTERS = [
  { id: 'natural',    icon: '🌿' },
  { id: 'infrared',   icon: '🔥' },
  { id: 'thermal',    icon: '🌡️' },
  { id: 'contrast',   icon: '✨' },
  { id: 'grayscale',  icon: '⚪' },
  { id: 'falsecolor', icon: '🎨' },
];

function getFilterList() { return FILTERS; }
function getFilterIndex(id) { return FILTERS.findIndex(f => f.id === id); }
function nextFilterId(id) {
  const idx = getFilterIndex(id);
  return FILTERS[(idx + 1) % FILTERS.length].id;
}

function $(id) { return document.getElementById(id); }

Promise.all([
  fetch('/variants').then(r => r.json()).then(d => { VARIANT_MAP = d; })
]).then(() => {
  $('nameInput').value = 'lead vector';
  renderName();
}).catch(() => {
  // Fallback: render with empty VARIANT_MAP (all 1/1 badges)
  $('nameInput').value = 'lead vector';
  renderName();
});

function getMaxVariant(letter) {
  return (VARIANT_MAP[letter] || 1) - 1;
}

function getRandomVariant(letter) {
  const max = VARIANT_MAP[letter] || 1;
  return Math.floor(Math.random() * max);
}

function renderName() {
  const raw = $('nameInput').value.trim();
  if (!raw) { $('brandSection').style.display = 'none'; return; }

  const name = raw.toLowerCase().replace(/[^a-z ]/g, '');
  if (!name) { 
    $('letterDisplay').innerHTML = '<div class="empty-state">Only letters allowed 🌍</div>';
    $('brandSection').style.display = 'none';
    return;
  }

  currentName = name;

  for (const c of name) {
    if (!(c in currentVariants)) {
      currentVariants[c] = getRandomVariant(c);
    }
  }

  buildDisplay();
  $('controls').style.display = 'flex';
  $('brandSection').style.display = 'flex';
  preloadImage();
}

function buildDisplay() {
  const display = $('letterDisplay');
  const globalFilter = $('filterSelect').value;
  display.innerHTML = '';

  for (const c of currentName) {
    if (c === ' ') {
      const spacer = document.createElement('div');
      spacer.style.cssText = 'width:10px;display:flex;align-items:center;justify-content:center;color:#555;font-size:1rem;';
      spacer.textContent = '|';
      display.appendChild(spacer);
      continue;
    }

    const effectiveFilter = currentFilters[c] || globalFilter;
    const filterClass = 'filter-' + effectiveFilter;

    const slot = document.createElement('div');
    slot.className = 'letter-slot ' + filterClass;
    slot.dataset.letter = c;

    const variant = currentVariants[c] || 0;
    const locKey = c + '_' + variant + '.jpg';
    const locData = LOCATIONS[locKey];
    const locName = locData ? locData.title : '';

    // Location label
    const label = document.createElement('div');
    label.className = 'location-label';
    label.textContent = locName;
    label.title = locData ? locData.coords + ' — click to view on Google Maps' : '';
    if (locData) {
      label.style.cursor = 'pointer';
      label.addEventListener('click', (e) => {
        e.stopPropagation();
        window.open('https://www.google.com/maps/place/' + encodeURIComponent(locData.coords), '_blank');
      });
    }
    slot.appendChild(label);

    // Image wrapper
    const wrapper = document.createElement('div');
    wrapper.className = 'img-wrapper';
    wrapper.style.cursor = 'pointer';
    wrapper.title = locData ? locData.coords + ' — open in Google Earth' : '';
    if (locData) {
      wrapper.addEventListener('click', (e) => {
        e.stopPropagation();
        window.open('https://earth.google.com/web/@' + encodeURIComponent(locData.coords) + ',5000a,35y', '_blank');
      });
    }

    const img = document.createElement('img');
    img.src = '/letter/' + c + '?v=' + variant;
    img.alt = c.toUpperCase();
    img.draggable = false;
    wrapper.appendChild(img);
    slot.appendChild(wrapper);

    // Footer
    const footer = document.createElement('div');
    footer.className = 'slot-footer';

    const reload = document.createElement('button');
    reload.className = 'reload-btn';
    reload.innerHTML = '↻';
    reload.title = 'Reload this letter';
    reload.addEventListener('click', (e) => {
      e.stopPropagation();
      reloadLetter(e.currentTarget.closest('.letter-slot'));
    });
    footer.appendChild(reload);

    // Per-letter filter cycle button
    const filterBtn = document.createElement('button');
    const curFilt = currentFilters[c];
    const filterInfo = FILTERS.find(f => f.id === (curFilt || globalFilter));
    filterBtn.className = 'filter-btn' + (curFilt ? ' overridden' : '');
    filterBtn.innerHTML = filterInfo.icon;
    filterBtn.title = 'Filter: ' + (curFilt || globalFilter) + ' — click to cycle';
    filterBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      cycleLetterFilter(e.currentTarget.closest('.letter-slot'));
    });
    footer.appendChild(filterBtn);

    const charLabel = document.createElement('span');
    charLabel.className = 'char-label';
    charLabel.textContent = c.toUpperCase();
    footer.appendChild(charLabel);

    const total = VARIANT_MAP[c] || 1;
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = (variant + 1) + '/' + total;
    badge.id = 'badge-' + c;
    footer.appendChild(badge);

    slot.appendChild(footer);

    // Click on image to cycle variant
    img.addEventListener('click', (e) => cycleVariant(e.currentTarget.closest('.letter-slot')));

    display.appendChild(slot);
  }
}

function cycleVariant(slot) {
  const letter = slot.dataset.letter;
  const max = getMaxVariant(letter);
  const current = currentVariants[letter] || 0;
  currentVariants[letter] = (current + 1) > max ? 0 : current + 1;
  updateAllLetterSlots(letter);
}

function reloadLetter(slot) {
  const letter = slot.dataset.letter;
  currentVariants[letter] = getRandomVariant(letter);
  updateAllLetterSlots(letter);
}

function cycleLetterFilter(slot) {
  const letter = slot.dataset.letter;
  const cur = currentFilters[letter] || $('filterSelect').value;
  currentFilters[letter] = nextFilterId(cur);

  // Only update the specific slot element
  slot.className = 'letter-slot filter-' + currentFilters[letter];
  const filterBtn = slot.querySelector('.filter-btn');
  if (filterBtn) {
    const info = FILTERS.find(f => f.id === currentFilters[letter]);
    filterBtn.innerHTML = info.icon;
    filterBtn.title = 'Filter: ' + currentFilters[letter] + ' — click to cycle';
    filterBtn.classList.add('overridden');
  }
}

function updateAllLetterSlots(letter) {
  const variant = currentVariants[letter] || 0;
  const slots = $('letterDisplay').querySelectorAll('.letter-slot');

  for (const slot of slots) {
    if (slot.dataset.letter === letter) {
      const img = slot.querySelector('img');
      img.src = '/letter/' + letter + '?v=' + variant;
      img.classList.remove('cycling');
      void img.offsetWidth;
      img.classList.add('cycling');

      const total = VARIANT_MAP[letter] || 1;
      const badge = slot.querySelector('.badge');
      if (badge) badge.textContent = (variant + 1) + '/' + total;

      const locKey = letter + '_' + variant + '.jpg';
      const locData = LOCATIONS[locKey];
      const label = slot.querySelector('.location-label');
      if (label) {
        label.textContent = locData ? locData.title : '';
        label.title = locData ? locData.coords : '';
        label.style.cursor = locData ? 'pointer' : '';
      }
    }
  }
}

function shuffleAll() {
  for (const c of currentName) {
    if (c !== ' ') {
      currentVariants[c] = getRandomVariant(c);
    }
  }
  buildDisplay();
  preloadImage();
}

function applyFilter() {
  currentFilters = {}; // reset per-letter overrides
  buildDisplay();
}

  function buildImageParams() {
    const choices = {};
    for (const c of currentName) {
      if (c !== ' ' && (c in currentVariants)) {
        choices[c] = currentVariants[c];
      }
    }

    const params = new URLSearchParams({ name: currentName });
    if (Object.keys(choices).length > 0) {
      params.set('variants', JSON.stringify(choices));
    }
    params.set('show_locations', 'true');
    params.set('watermarked', 'false');

    const globalFilter = $('filterSelect').value;
    if (globalFilter) {
      params.set('filter', globalFilter);
    }
    const activeOverrides = Object.entries(currentFilters)
      .filter(([letter, f]) => f && f !== globalFilter);
    if (activeOverrides.length > 0) {
      params.set('letter_filters', JSON.stringify(Object.fromEntries(activeOverrides)));
    }

    return params;
  }

  // Preload image when name changes so download is instant
  function preloadImage() {
    // Warm-up fetch — browser caches it
    const params = buildImageParams();
    fetch('/generate?' + params.toString()).catch(() => {});
  }

  function downloadImage() {
    // Always fetch branded version — don't use cached display blob
    const fileName = currentName.replace(/ /g, '_') + '_geoglyph.jpg';
    const params = buildImageParams();
    params.set('watermarked', 'true');
    fetch('/generate?' + params.toString())
      .then(r => r.blob())
      .then(blob => downloadBlob(blob, fileName))
      .catch(() => showToast('Failed to generate image. Try again.'));
  }

// ===== Share =====
function shareCurrentName() {
  if (currentName) shareImage();
}

async function shareImage() {
  const choices = {};
  for (const c of currentName) {
    if (c !== ' ' && (c in currentVariants)) {
      choices[c] = currentVariants[c];
    }
  }

  const params = new URLSearchParams({ name: currentName });
  if (Object.keys(choices).length > 0) {
    params.set('variants', JSON.stringify(choices));
  }
  params.set('watermarked', 'true');
  params.set('show_locations', 'true');

  // Include current filter state in share
  const globalFilter = $('filterSelect').value;
  if (globalFilter) {
    params.set('filter', globalFilter);
  }
  // Per-letter overrides (only if different from global)
  const activeOverrides = Object.entries(currentFilters)
    .filter(([letter, f]) => f && f !== globalFilter);
  if (activeOverrides.length > 0) {
    params.set('letter_filters', JSON.stringify(Object.fromEntries(activeOverrides)));
  }

  const shareUrl = '/generate?' + params.toString();
  const fileName = currentName.replace(/ /g, '_') + '_geoglyph.jpg';

  // Fetch fresh branded version
  let blob;
  try {
    const resp = await fetch(shareUrl);
    blob = await resp.blob();
  } catch {
    showToast('Could not generate share image.');
    return;
  }

  shareBlob(blob, fileName);
}

async function shareBlob(blob, fileName) {
  const file = new File([blob], fileName, { type: 'image/jpeg' });

  try {
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: 'GeoGlyph',
        text: '🌍 My name in satellite imagery — leadvector.sh',
      });
    } else if (navigator.share) {
      await navigator.share({
        title: 'GeoGlyph — My Name in Landsat',
        text: '🌍 My name in satellite imagery via leadvector.sh',
        url: window.location.href,
      });
    } else {
      // Desktop: download image + copy the page link
      downloadBlob(blob, fileName);
      try {
        await navigator.clipboard.writeText(window.location.href);
        showToast('📸 Image downloaded! Link copied.');
      } catch {
        showToast('📸 Image downloaded! Share it online.');
      }
    }
  } catch (err) {
    if (err.name === 'AbortError') return;
    // Share failed (e.g. user declined), offer download instead
    downloadBlob(blob, fileName);
    showToast('📸 Image downloaded!');
  }
}

function downloadBlob(blob, fileName) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== Toast =====
function showToast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 3000);
}

$('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') renderName();
});

</script>
